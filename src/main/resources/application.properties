# ============================================
# PERFIL DEFAULT (LOCAL - H2)
# ============================================
spring.application.name=solicitacao-api

# ============================================
# H2 DATABASE
# ============================================
spring.datasource.url=jdbc:h2:mem:solicitacao_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ============================================
# FLYWAY DESABILITADO
# ============================================
spring.flyway.enabled=false

# ============================================
# ELASTICSEARCH DESABILITADO
# ============================================
spring.data.elasticsearch.repositories.enabled=false
management.health.elasticsearch.enabled=false

# ============================================
# SERVER
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# JWT
# ============================================
jwt.secret=qU8sK2pL5xR9mZ7cW3vA4nY6bT1gH0jF
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# VIACEP
# ============================================
viacep.url=https://viacep.com.br/ws

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ============================================
# SWAGGER
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=true
springdoc.packages-to-scan=br.com.solicitacao.api.controller

# ============================================
# LOGGING
# ============================================
logging.level.br.com.solicitacao=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n