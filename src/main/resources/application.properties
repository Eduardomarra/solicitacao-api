# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
spring.application.name=solicitacao-api

# ============================================
# H2 DATABASE (EM MEMÓRIA)
# ============================================
spring.datasource.url=jdbc:h2:mem:solicitacao_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# H2 CONSOLE
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# ============================================
# FLYWAY DESABILITADO
# ============================================
spring.flyway.enabled=false

# ============================================
# ELASTICSEARCH - DESABILITADO
# ============================================
spring.data.elasticsearch.repositories.enabled=false
spring.data.elasticsearch.uris=http://localhost:9200

# ============================================
# SERVER
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# JWT
# ============================================
jwt.secret=qU8sK2pL5xR9mZ7cW3vA4nY6bT1gH0jF
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# VIACEP
# ============================================
viacep.url=https://viacep.com.br/ws

# ============================================
# ACTUATOR - DESABILITAR HEALTH DO ELASTICSEARCH
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.health.db.enabled=true
management.health.elasticsearch.enabled=false

# ============================================
# LOGGING
# ============================================
logging.level.br.com.solicitacao=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n