# ============================================
# TEST PROFILE
# ============================================
spring.application.name=solicitacao-api-test

# ============================================
# H2 DATABASE (EM MEMÓRIA PARA TESTES)
# ============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# FLYWAY DESABILITADO
# ============================================
spring.flyway.enabled=false

# ============================================
# ELASTICSEARCH DESABILITADO
# ============================================
spring.data.elasticsearch.repositories.enabled=false
spring.data.elasticsearch.uris=http://localhost:9200

# ============================================
# JWT
# ============================================
jwt.secret=testSecretKey12345678901234567890
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# VIACEP
# ============================================
viacep.url=https://viacep.com.br/ws

# ============================================
# LOGGING
# ============================================
logging.level.br.com.solicitacao=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always