# ============================================
# PERFIL DOCKER
# ============================================
spring.application.name=solicitacao-api

# ============================================
# DATABASE - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://postgres:5432/solicitacao_db
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ============================================
# FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ============================================
# ELASTICSEARCH
# ============================================
spring.data.elasticsearch.uris=http://elasticsearch:9200
spring.data.elasticsearch.repositories.enabled=true

# ============================================
# SERVER
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# JWT
# ============================================
jwt.secret=${JWT_SECRET:qU8sK2pL5xR9mZ7cW3vA4nY6bT1gH0jF}
jwt.expiration=86400000

# ============================================
# VIACEP
# ============================================
viacep.url=https://viacep.com.br/ws

# ============================================
# LOGGING
# ============================================
logging.level.br.com.solicitacao=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always