# ============================================
# PERFIL DOCKER - COM ELASTICSEARCH
# ============================================
spring.application.name=solicitacao-api

# ============================================
# POSTGRESQL DATABASE
# ============================================
spring.datasource.url=jdbc:postgresql://postgres:5432/solicitacao_db
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ============================================
# FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ============================================
# ELASTICSEARCH - COM TIMEOUT MAIOR E RETRY
# ============================================
spring.data.elasticsearch.uris=http://elasticsearch:9200
spring.data.elasticsearch.repositories.enabled=true
spring.data.elasticsearch.socket-timeout=60000
spring.data.elasticsearch.connection-timeout=60000
spring.data.elasticsearch.read-timeout=60000
management.health.elasticsearch.enabled=false
spring.elasticsearch.uris=http://elasticsearch:9200

# ============================================
# SERVER
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# JWT
# ============================================
jwt.secret=${JWT_SECRET:qU8sK2pL5xR9mZ7cW3vA4nY6bT1gH0jF}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# VIACEP
# ============================================
viacep.url=https://viacep.com.br/ws

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ============================================
# SWAGGER
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=true
springdoc.packages-to-scan=br.com.solicitacao.api.controller

# ============================================
# LOGGING
# ============================================
logging.level.br.com.solicitacao=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n