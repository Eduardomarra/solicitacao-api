version: '3.8'

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: solicitacao-postgres
    environment:
      POSTGRES_DB: solicitacao_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - solicitacao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d solicitacao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ELASTICSEARCH
  # ============================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: solicitacao-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - solicitacao-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # APLICAÇÃO SPRING BOOT
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solicitacao-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/solicitacao_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_ELASTICSEARCH_URIS: http://elasticsearch:9200
      JWT_SECRET: qU8sK2pL5xR9mZ7cW3vA4nY6bT1gH0jF
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - solicitacao-network
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  solicitacao-network:
    driver: bridge